<div class="center-wrapper">

		<div id="podcast-loading" class="podcast-loading">加载中...</div>

		<div id="podcast-list" class="blog-list-main-wrapper" style="display:none">
			<template id="podcast-item-tpl">
				<div class="blog-summary-wrapper-container">
					<a class="blog-summary-inner-container">
						<div class="blog-summary-title"></div>
						<div class="blog-summary-date-wrapper">
							<div class="blog-summary-date"></div>
							<div class="podcast-episode-duration"></div>

						<div class="blog-summary-preface"></div>

				</div>
			</template>
		</div>

		<div id="podcast-detail" class="podcast-detail-wrapper" style="display:none">
			<div class="article-real-container">
				<div class="article_card_container">
					<div class="article_card_inner_container">
						
						<div class="article-normal-info">
							<div class="normal_important_title_size single-title text-shadow" id="podcast-detail-title"></div>
							<div class="podcast-detail-meta">
								<span id="detail-date"></span>
							</div>
						</div>
						<div class="content-container">
							<div class="podcast-player podcast-detail-audio-wrapper">

								</div>

											<svg class="podcast-icon-pause" viewBox="0 0 24 24" width="20" height="20" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/></svg>
										</button>
										<div class="podcast-player-times">
											<span id="podcast-current-time">0:00</span>
											<span class="podcast-player-sep">/</span>
											<span id="podcast-duration">0:00</span>
										</div>
									</div>
									<div class="podcast-player-right">
										<button class="podcast-player-btn" id="podcast-speed-btn" type="button">1x</button>
										<button class="podcast-player-btn" id="podcast-backward-btn" type="button" title="后退15秒">
											<svg viewBox="0 0 24 24" width="18" height="18"><path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="currentColor"/></svg>
										</button>
									</div>
								</div>
