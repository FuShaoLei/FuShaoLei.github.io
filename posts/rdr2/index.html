<p>绝对值得一玩的大作，更加真实的物理引擎，让人沉入其中的天气系统，以及马匹，武器系统，还有探索不完的陌生人任务，最主要是它的剧情：帮派的没落，人与人之间的爱恨情仇，救赎与被救赎，塑造的人物，以及贴合主题的音乐，玩到最后，除了感动，还是感动，这游戏给我太多的感动了，这绝对是我至今玩过最好的游戏，目前我在玩第二遍，非常的推荐。</p>
