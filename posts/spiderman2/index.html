				<p>主线流程很短，就十多个小时，经典美式爆米花剧情，食之无味，弃之可惜，边玩都能边猜到下一步的剧情走向，经典英雄主义+莫名其妙的反派，还说着什么一起拯救世界的话。</p>
<p>还有经典的政治正确，黑人白人残疾人同性恋大杂烩，看到黑人就觉得恶心。</p>
<p>不过操作手感不错，各种大场面的演出很电影，可惜的是主线通关完之后只能操作那个黑人蜘蛛侠了。。</p>
