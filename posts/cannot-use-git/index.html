			<div class="content-container">
				<p>莫名其妙啊，不仅是公司里连不上，我家里的电脑也连接不上了，无语</p>
<p>换个端口就好了，在<code>C:\Users\&lt;用户名&gt;\.ssh</code>目录下新建一个文件<code>config</code>没有后缀，然后填入如下内容就好了</p>
<pre tabindex="0"><code>Host github.com
  Hostname ssh.github.com
  Port 443
</code></pre>
