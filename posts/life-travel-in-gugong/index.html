				<p>来北京实习也已经有两个多月了，但是因为这个学期选了三门课 要做网上的作业，然后又因为自己比较懒，再加上天气变冷了，虽然一直在北京，但从未出去玩过。眼看下个星期就要离职了，这时不出去玩更待何时？</p>
<p>于是，在十二月十二号的早晨十点，我便乘坐地铁，去往故宫。</p>
