				<p>《神秘海域·失落的遗产》这游戏本是属于《神秘海域4》的DLC，但是体量几乎可以达到一个单独的作品了，之前在23年年初的时候草草通关过一次，这几天回味了一遍，整体流程在8个小时左右，我感觉有两个小时都是我在拍照片~😆，因为风景太美了。下面放照片~</p>
