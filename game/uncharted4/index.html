				<p>电影般的演出效果，连贯有逻辑的叙述，现实与孩童时期的交叉讲述手法，有趣的解密小游戏互动，以及德雷克的兄弟情，无一都让我印象深刻。结尾的刀战手感不错，还有在黑洞探险的时候，手电筒没电了需要敲击手柄，非常有趣的设计，战斗方面对于潜行的部分支持不错，但是对于枪械射击来说，手感稍微有点差一些，但也可以接受。还有内森的老婆，不得不说是真漂亮啊哈哈。</p>
