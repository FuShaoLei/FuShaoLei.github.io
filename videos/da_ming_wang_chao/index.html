				<p>全员演技在线，眼神戏很丰富，剧中说的改稻为桑，应该是参考的青苗法（最近在读李一冰的《苏东坡传》，由此联想），但是总有一些莫名其妙的黑白剪辑，也许是艺术吧（问号），剧中的海瑞（黄志忠饰）演的不错，为人刚正不阿，一本大明律法，据理力争，刚好我现居海口这里，距离海瑞墓文化宫也才三四公里，改天也空一定要参观一下。</p>
